<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quotes</title>
    <style>
   
        /* 1. DARK THEME SETUP */
        body {
            background-color: #0a0a0b;
            color: #e4e4e7;
            font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 60px 20px;
        }

        .app-container {
            width: 100%;
            max-width: 500px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(to right, #fff, #555);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }

        /* 2. THE INPUT BAR (Sleek & Minimal) */
        .input-card {
            background: #18181b;
            border: 1px solid #27272a;
            border-radius: 16px;
            padding: 8px;
            display: flex;
            gap: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 30px;
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 12px 16px;
            color: white;
            font-size: 15px;
            outline: none;
        }

        #qBtn {
            background: white;
            color: black;
            border: none;
            padding: 0 20px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        #qBtn:hover {
            background: #d4d4d8;
            transform: translateY(-1px);
        }

        /* 3. THE QUOTE LIST */
        ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        li {
            background: #18181b;
            border: 1px solid #27272a;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            display: flex;
            flex-direction: column; /* Stacked text top, buttons bottom-right */
            gap: 15px;
            transition: border-color 0.3s;
        }

        li:hover {
            border-color: #3f3f46;
        }

        .quote-text {
            font-size: 16px;
            line-height: 1.5;
            color: #d4d4d8;
        }

        /* 4. BUTTON GROUP (Clean & Tight) */
        .btn-group {
            display: flex;
            justify-content: flex-end; /* Keeps them on the right */
            gap: 8px;
        }

        .edit-btn, .del-btn {
            background: #27272a;
            color: #a1a1aa;
            border: none;
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .edit-btn:hover { background: #3f3f46; color: white; }
        .del-btn:hover { background: #450a0a; color: #f87171; }

    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <h1>Quotation_</h1>
        </header>

        <div class="input-card">
            <input type="text" id="qInput" placeholder="Capture a thought...">
            <button id="qBtn">Add</button>
        </div>

        <ul id="qList"></ul>
    </div>

    <script type="module" src="index.js"></script>
</body>
</html>
